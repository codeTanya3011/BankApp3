version: '3.8'

services:
  db_container_5:
    image: postgres:15-alpine
    container_name: postgres_credits_v5
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5435:5432"
    volumes:
      - credits_data_v5:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fastapi_app_v5
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db_container_5:
        condition: service_healthy

volumes:
  credits_data_v5: